about:
  content: >
    # 사이트 소개


    이 사이트는 개발자와 실무자를 위한 **무료 온라인 도구 모음**입니다. 사업자등록번호·주민등록번호 검증, 부가가치세 계산 같은 한국 실무용 도구부터 JSON 포맷터, 해시 생성, QR 코드 등 개발 도구까지 설치 없이 브라우저에서 바로 사용할 수 있어요.


    이 사이트는 [Corentin Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about) 님이 만든 오픈소스 프로젝트 [it-tools](https://github.com/CorentinTh/it-tools)(GPL-3.0)를 기반으로 한국어화하고 한국 전용 도구를 추가한 것입니다. 원작자께 감사드립니다.


    ## 버그 제보 / 도구 제안


    원하는 도구가 없거나 오류를 발견하셨다면 언제든 알려주세요.
